<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">

<div class="max-w-xl mx-auto min-h-screen bg-white">

    <!-- SIGN UP SCREEN -->
    <div id="signup-screen">
        <div class="p-6">
            <h1 class="text-4xl font-bold text-center text-rose-600 mt-10">HeartBloom</h1>
            <p class="text-center text-gray-500">Find Love • Share Moments • Grow Together</p>

            <div class="mt-10 space-y-4 px-4">
                <input id="fullName" placeholder="Full Name" class="w-full p-4 border rounded-2xl">
                <input id="email" type="email" placeholder="Email Address" class="w-full p-4 border rounded-2xl">
                <input id="phone" placeholder="Phone Number" class="w-full p-4 border rounded-2xl">
                <input id="password" type="password" placeholder="Create Password" class="w-full p-4 border rounded-2xl">
                
                <button onclick="completeSignup()" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-4 rounded-2xl font-bold">Create Account</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <!-- Top Nav -->
        <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-bold text-rose-600">HeartBloom</h1>
            <div onclick="logout()" class="text-gray-500 cursor-pointer">Logout</div>
        </div>

        <!-- Feed Tabs -->
        <div class="flex border-b">
            <button onclick="switchWall(0)" class="flex-1 py-4 font-medium tab active">Public Wall</button>
            <button onclick="switchWall(1)" class="flex-1 py-4 font-medium tab">Private (Partner)</button>
            <button onclick="switchWall(2)" class="flex-1 py-4 font-medium tab">Friends</button>
        </div>

        <div class="p-4">
            <!-- Public Wall -->
            <div id="wall-0">
                <div class="bg-white rounded-3xl p-5 mb-6">
                    <p class="font-medium">Share your moment with the world</p>
                    <textarea id="publicPost" class="w-full h-24 border rounded-2xl p-4 mt-3" placeholder="How is love treating you today?"></textarea>
                    <button onclick="postPublic()" class="mt-3 bg-rose-600 text-white px-8 py-3 rounded-2xl">Post Publicly</button>
                </div>
            </div>

            <!-- Private Partner Wall -->
            <div id="wall-1" class="hidden">
                <p class="text-center py-10 text-gray-400">Private moments with your partner will appear here 💕</p>
            </div>

            <!-- Friends Wall -->
            <div id="wall-2" class="hidden">
                <p class="text-center py-10 text-gray-400">Your close friends moments</p>
            </div>
        </div>
    </div>
</div>

<script>
    function completeSignup() {
        const name = document.getElementById("fullName").value;
        if (!name) return alert("Enter your name");
        
        alert(`Account created for ${name}!\n\nOTP has been sent to your email for verification.`);
        document.getElementById("signup-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
    }

    function logout() {
        document.getElementById("main-app").classList.add("hidden");
        document.getElementById("signup-screen").classList.remove("hidden");
    }

    function switchWall(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active', 'border-b-2', 'border-rose-600'));
        event.target.classList.add('active', 'border-b-2', 'border-rose-600');
        
        for (let i = 0; i < 3; i++) {
            const wall = document.getElementById(`wall-${i}`);
            if (wall) wall.classList.toggle('hidden', i !== n);
        }
    }

    function postPublic() {
        const text = document.getElementById("publicPost").value;
        if (text) {
            alert("✅ Moment posted on Public Wall!\nVisible to global community.");
            document.getElementById("publicPost").value = "";
        }
    }

    // Start with signup
    console.log("HeartBloom Professional Loaded");
</script>
</body>
</html>
