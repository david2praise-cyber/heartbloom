<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-pink-50 min-h-screen">

<div class="max-w-xl mx-auto p-4">
    <h1 class="text-4xl font-bold text-rose-600 text-center my-10">HeartBloom</h1>

    <!-- Auth -->
    <div id="auth-screen">
        <div class="bg-white rounded-3xl p-8">
            <input id="email" type="email" placeholder="Email" class="w-full p-5 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="Password" class="w-full p-5 border rounded-2xl mb-6">
            <button onclick="signUp()" class="w-full bg-rose-600 text-white py-5 rounded-3xl mb-3">Sign Up</button>
            <button onclick="login()" class="w-full border border-rose-600 text-rose-600 py-5 rounded-3xl">Login</button>
        </div>
    </div>

    <!-- Main -->
    <div id="main-screen" class="hidden">
        <button onclick="logout()" class="text-red-500">Logout</button>
        
        <textarea id="postText" class="w-full h-32 p-5 border rounded-3xl mt-8" placeholder="Share your love moment..."></textarea>
        <button onclick="postMoment()" class="w-full bg-rose-600 text-white py-5 rounded-3xl mt-4">Post to Wall</button>
        
        <div id="feed" class="mt-12 space-y-6"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA6XhN7vkrjL8eNEOyBOVXf04Mf_2gAPnc",
      authDomain: "heartbloom-love.firebaseapp.com",
      projectId: "heartbloom-love",
      storageBucket: "heartbloom-love.firebasestorage.app",
      messagingSenderId: "411468099332",
      appId: "1:411468099332:web:0c588e611dbc0d06102a51",
      measurementId: "G-7EE4Q0S43H"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function signUp() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Account created! Login now.")).catch(e => alert(e.message));
    }

    function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.signInWithEmailAndPassword(email, pass).then(() => {
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            loadFeed();
        }).catch(e => alert(e.message));
    }

    function logout() {
        auth.signOut();
        location.reload();
    }

    function postMoment() {
        const text = document.getElementById("postText").value;
        if (text) {
            db.collection("posts").add({text: text, createdAt: Date.now()})
                .then(() => {
                    alert("💕 Post saved!");
                    document.getElementById("postText").value = "";
                    loadFeed();
                });
        }
    }

    function loadFeed() {
        db.collection("posts").orderBy("createdAt", "desc").limit(20).get()
            .then(snapshot => {
                let html = "";
                snapshot.forEach(doc => {
                    html += `<div class="bg-white p-6 rounded-3xl mb-4">${doc.data().text}</div>`;
                });
                document.getElementById("feed").innerHTML = html || "<p>No posts yet. Be the first!</p>";
            });
    }
</script>
</body>
</html>
