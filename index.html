<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(to bottom, #fdf2f8, #fce7f3); }
        .love-card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(225, 29, 72, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Romantic Header -->
    <div class="bg-gradient-to-r from-rose-500 to-pink-500 text-white p-6">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">💞</span>
                <h1 class="text-3xl font-bold tracking-tight">HeartBloom</h1>
            </div>
            <div onclick="showSettings()" class="text-2xl cursor-pointer">☰</div>
        </div>
        <p class="text-pink-100 mt-1">Love in every moment</p>
    </div>

    <div class="p-5 space-y-8">
        <!-- Daily Love -->
        <div class="love-card p-6">
            <p class="text-rose-500 text-sm">For you today 💌</p>
            <p class="text-2xl mt-3 leading-tight">"You are my favorite reason to smile every morning."</p>
        </div>

        <!-- Feed -->
        <div>
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-2xl">🌹</span> Love Moments</h2>
            <div id="romantic-feed" class="space-y-6"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t max-w-xl mx-auto flex justify-around py-3">
        <button onclick="switchTab(0)" class="text-rose-500">🏠</button>
        <button onclick="switchTab(1)" class="text-3xl">💞</button>
        <button onclick="switchTab(2)" class="text-rose-500">❤️</button>
        <button onclick="switchTab(3)" class="text-rose-500">👥</button>
    </div>

<script>
    function addRomanticPost(text) {
        const feed = document.getElementById("romantic-feed");
        feed.innerHTML += `
            <div class="love-card p-6">
                <p class="text-gray-700">${text}</p>
                <div class="flex gap-6 mt-6 text-pink-400">
                    <i class="fas fa-heart cursor-pointer hover:text-rose-500"></i>
                    <i class="fas fa-comment cursor-pointer hover:text-rose-500"></i>
                </div>
            </div>
        `;
    }

    // Sample romantic posts
    setTimeout(() => {
        addRomanticPost("The way you look at me makes the whole world disappear...");
        addRomanticPost("Just remembered our first date and smiled like a fool ❤️");
    }, 800);

    function showSettings() {
        alert("Romantic Settings coming soon 💕\n(Profile, Privacy, Language, etc.)");
    }

    function switchTab(n) {
        alert("Beautiful page loading... 💐");
    }
</script>
</body>
</html>
