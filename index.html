<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(225,29,72,0.15); }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-xl mx-auto p-6">
    <div class="text-center py-10">
        <span class="text-6xl">💞</span>
        <h1 class="text-4xl font-bold text-rose-600">HeartBloom</h1>
        <p class="text-pink-400">Love in every moment</p>
    </div>

    <div id="auth" class="card p-8">
        <input id="email" type="email" placeholder="Email Address" class="w-full p-5 border border-pink-200 rounded-2xl mb-4">
        <input id="password" type="password" placeholder="Password" class="w-full p-5 border border-pink-200 rounded-2xl mb-6">
        <button onclick="signUp()" class="w-full bg-rose-600 text-white py-5 rounded-3xl mb-3">Create Account</button>
        <button onclick="login()" class="w-full border border-rose-500 text-rose-600 py-5 rounded-3xl">Login</button>
    </div>

    <div id="main" class="hidden mt-8">
        <button onclick="logout()" class="text-red-500">Logout</button>
        <div class="card p-6 mt-6">
            <textarea id="postText" class="w-full h-36 p-5 border border-pink-200 rounded-3xl" placeholder="Share your love moment..."></textarea>
            <button onclick="postMoment()" class="w-full mt-6 bg-rose-600 text-white py-5 rounded-3xl">Share Moment 💕</button>
        </div>
        <div id="feed" class="mt-10 space-y-6"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA6XhN7vkrjL8eNEOyBOVXf04Mf_2gAPnc",
      authDomain: "heartbloom-love.firebaseapp.com",
      projectId: "heartbloom-love",
      storageBucket: "heartbloom-love.firebasestorage.app",
      messagingSenderId: "411468099332",
      appId: "1:411468099332:web:0c588e611dbc0d06102a51",
      measurementId: "G-7EE4Q0S43H"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function signUp() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Account created!")).catch(e => alert(e.message));
    }

    function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.signInWithEmailAndPassword(email, pass).then(() => {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("main").classList.remove("hidden");
            loadFeed();
        }).catch(e => alert(e.message));
    }

    function logout() {
        auth.signOut();
        location.reload();
    }

    function postMoment() {
        const text = document.getElementById("postText").value;
        if (text) {
            db.collection("posts").add({text: text, time: Date.now()}).then(() => {
                alert("💕 Posted!");
                document.getElementById("postText").value = "";
                loadFeed();
            });
        }
    }

    function loadFeed() {
        db.collection("posts").orderBy("time", "desc").limit(10).get().then(snapshot => {
            let html = "";
            snapshot.forEach(doc => html += `<div class="card p-6">${doc.data().text}</div>`);
            document.getElementById("feed").innerHTML = html || "<p>No moments yet</p>";
        });
    }
</script>
</body>
</html>
