<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-pink-50">

<div class="max-w-xl mx-auto p-4">
    <div class="bg-rose-600 text-white p-5 rounded-3xl">
        <h1 class="text-3xl font-bold">HeartBloom</h1>
        <p class="text-sm">Connect Safely</p>
    </div>

    <div class="mt-6 bg-white rounded-3xl p-6 shadow">
        <h2 class="font-bold mb-4">Couple Mode</h2>
        <button onclick="generateCode()" class="w-full bg-rose-500 text-white py-4 rounded-2xl mb-4">Generate My Couple Code</button>
        
        <div class="border p-4 rounded-2xl mb-6">
            <p class="text-sm text-gray-500">Enter Partner Code</p>
            <input id="partnerCode" placeholder="Enter code here" class="w-full p-4 border rounded-2xl mt-2">
            <button onclick="joinCouple()" class="w-full mt-3 bg-green-600 text-white py-4 rounded-2xl">Join as Partner</button>
        </div>
    </div>

    <div class="mt-8">
        <h2 class="font-bold mb-4">Discover People</h2>
        <button onclick="findFriends()" class="w-full bg-white border border-rose-300 py-6 rounded-3xl mb-3">🌍 Neighborhood Friends</button>
        <button onclick="findAdmirers()" class="w-full bg-white border border-rose-300 py-6 rounded-3xl">❤️ Random Admirers</button>
    </div>
</div>

<script>
    function generateCode() {
        const code = "HB-" + Math.floor(100000 + Math.random() * 900000);
        alert("✅ Your Couple Code is:\n\n" + code + "\n\nShare this code with your wife.");
    }

    function joinCouple() {
        const code = document.getElementById("partnerCode").value;
        if (code) {
            alert("✅ Connected successfully as partners! 💕\nYou and your wife are now linked.");
        } else {
            alert("Enter the code first.");
        }
    }

    function findFriends() {
        alert("🔍 Looking for people near you...\n\n(Neighborhood mode with permission system)");
    }

    function findAdmirers() {
        alert("❤️ Showing admirers...\n\nSafety check active.");
    }
</script>
</body>
</html>
