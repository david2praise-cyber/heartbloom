<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50">

<div class="max-w-xl mx-auto p-4">
    <div class="bg-gradient-to-r from-rose-500 to-purple-600 text-white p-5 rounded-3xl mb-6">
        <h1 class="text-3xl font-bold">HeartBloom</h1>
        <p class="text-sm">Love Without Borders</p>
    </div>

    <!-- Language -->
    <div class="bg-white p-4 rounded-3xl mb-6">
        <label class="block text-sm mb-2">Choose Language / Langue / Ede</label>
        <select id="lang" onchange="switchLanguage()" class="w-full p-4 border rounded-2xl">
            <option value="en">English</option>
            <option value="pidgin">Naija Pidgin</option>
            <option value="yo">Yoruba</option>
            <option value="ig">Igbo</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>
    </div>

    <!-- News Feed -->
    <div class="mb-6">
        <h2 class="font-bold text-lg mb-3">❤️ Love Feed (Global)</h2>
        <div class="bg-white rounded-3xl p-5 mb-4 shadow">
            <p class="text-sm text-gray-500">From Paris • 2hrs ago</p>
            <p>"Love is the same in every language. Today I proposed in French 💍"</p>
        </div>
        <div class="bg-white rounded-3xl p-5 shadow">
            <p class="text-sm text-gray-500">From Lagos • Yesterday</p>
            <p>"She said Yes! After 3 years of courtship ❤️"</p>
        </div>
    </div>

    <!-- Couple Code -->
    <button onclick="generateCode()" class="w-full bg-rose-600 text-white py-4 rounded-3xl mb-4">Generate Couple Code</button>
    
    <input id="codeInput" placeholder="Enter Partner Code" class="w-full p-4 border rounded-3xl mb-2">
    <button onclick="joinPartner()" class="w-full bg-green-600 text-white py-4 rounded-3xl">Connect with Partner</button>
</div>

<script>
    function switchLanguage() {
        const lang = document.getElementById("lang").value;
        let msg = "Language changed!";
        if (lang === "pidgin") msg = "App don change to Pidgin!";
        else if (lang === "yo") msg = "E kaabo! (Welcome in Yoruba)";
        alert(msg);
    }

    function generateCode() {
        const code = "HB-" + Math.floor(100000 + Math.random() * 900000);
        alert("Your Couple Code:\n" + code + "\n\nShare with your partner.");
    }

    function joinPartner() {
        if (document.getElementById("codeInput").value) {
            alert("✅ You and your partner don connect successfully! 💕");
        }
    }
</script>
</body>
</html>
