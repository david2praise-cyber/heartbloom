<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: linear-gradient(135deg, #fdf2f8, #fce7f3); font-family: system-ui; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 24px; }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-xl mx-auto p-6">
    <div class="text-center py-12">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-rose-100 rounded-full text-5xl mb-4">💞</div>
        <h1 class="text-4xl font-bold text-rose-600">HeartBloom</h1>
        <p class="text-rose-400">Love in every moment</p>
    </div>

    <!-- Login Card -->
    <div class="glass p-8 shadow-xl">
        <input id="email" type="email" placeholder="Email Address" class="w-full p-5 border border-pink-200 rounded-2xl mb-4 text-lg">
        <input id="password" type="password" placeholder="Password" class="w-full p-5 border border-pink-200 rounded-2xl mb-8 text-lg">
        
        <button onclick="signUp()" class="w-full bg-rose-600 hover:bg-rose-700 text-white py-5 rounded-3xl text-lg font-medium mb-3">Create Account</button>
        <button onclick="login()" class="w-full border-2 border-rose-500 text-rose-600 py-5 rounded-3xl text-lg font-medium">Login</button>
    </div>

    <div id="main" class="hidden mt-10">
        <button onclick="logout()" class="text-red-500">Logout</button>
        <div class="mt-8">
            <textarea id="postText" class="w-full h-40 p-5 border border-pink-200 rounded-3xl" placeholder="Write something from your heart..."></textarea>
            <button onclick="postMoment()" class="w-full mt-6 bg-gradient-to-r from-rose-500 to-pink-500 text-white py-5 rounded-3xl text-lg">Share with the World 💕</button>
        </div>
        <div id="feed" class="mt-12"></div>
    </div>
</div>

<script>
    // Your Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA6XhN7vkrjL8eNEOyBOVXf04Mf_2gAPnc",
      authDomain: "heartbloom-love.firebaseapp.com",
      projectId: "heartbloom-love",
      storageBucket: "heartbloom-love.firebasestorage.app",
      messagingSenderId: "411468099332",
      appId: "1:411468099332:web:0c588e611dbc0d06102a51",
      measurementId: "G-7EE4Q0S43H"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function signUp() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Account created!")).catch(e => alert(e.message));
    }

    function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        auth.signInWithEmailAndPassword(email, pass).then(() => {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("main").classList.remove("hidden");
            loadFeed();
        }).catch(e => alert(e.message));
    }

    function logout() {
        auth.signOut();
        location.reload();
    }

    function postMoment() {
        const text = document.getElementById("postText").value;
        if (text) db.collection("posts").add({text, time: Date.now()}).then(() => {
            alert("💕 Shared!");
            document.getElementById("postText").value = "";
            loadFeed();
        });
    }

    function loadFeed() {
        db.collection("posts").orderBy("time", "desc").limit(10).get().then(s => {
            let html = "";
            s.forEach(d => html += `<div class="bg-white p-6 rounded-3xl mb-6 shadow">${d.data().text}</div>`);
            document.getElementById("feed").innerHTML = html;
        });
    }
</script>
</body>
</html>
