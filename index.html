<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕 - Find Love Safely</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-50">

<div class="max-w-xl mx-auto min-h-screen">
    <!-- Top Bar -->
    <div class="bg-rose-600 text-white p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">HeartBloom</h1>
        <span class="text-sm">🌍 Public Mode (Safe)</span>
    </div>

    <div class="p-4">
        <!-- Safety Banner -->
        <div class="bg-amber-100 border border-amber-300 p-4 rounded-3xl mb-6 text-sm">
            <strong>🛡️ Safety First:</strong> Video verification during daytime only + All calls recorded.
        </div>

        <!-- Discover -->
        <h2 class="text-xl font-semibold mb-4">People Looking for Love Near You</h2>
        
        <div class="space-y-4">
            <div class="bg-white rounded-3xl p-5 shadow">
                <div class="flex gap-4">
                    <div class="w-16 h-16 bg-pink-200 rounded-2xl"></div>
                    <div class="flex-1">
                        <div class="font-bold">Chioma • 27 • Lagos</div>
                        <div class="text-sm text-gray-600">I dey look for serious relationship leading to marriage</div>
                        <button onclick="startVerify()" class="mt-3 text-xs bg-green-600 text-white px-5 py-2 rounded-xl">Start Video Verify (Daytime only)</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="recordVideoCall()" class="bg-white p-6 rounded-3xl text-center shadow">
                📹 Video Call + Record
            </button>
            <button onclick="shareMood()" class="bg-white p-6 rounded-3xl text-center shadow">
                💖 Share Mood
            </button>
        </div>
    </div>
</div>

<script>
    function startVerify() {
        const now = new Date();
        const hour = now.getHours();
        if (hour >= 9 && hour <= 17) {
            alert("✅ Video verification started.\nRecording go save automatically for safety.");
        } else {
            alert("⚠️ Video verification only allowed between 9AM - 5PM for safety.");
        }
    }

    function recordVideoCall() {
        alert("📹 Video call started.\nThis call is being recorded for both parties safety.");
    }

    function shareMood() {
        alert("Mood shared publicly with safety filter.");
    }
</script>
</body>
</html>
