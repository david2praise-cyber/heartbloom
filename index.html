<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-xl mx-auto">
    <!-- Signup -->
    <div id="signup" class="p-6">
        <h1 class="text-4xl text-center font-bold text-rose-600 mt-12">HeartBloom</h1>
        <div class="mt-12 bg-white rounded-3xl p-8">
            <input id="name" class="w-full p-5 border rounded-2xl mb-4" placeholder="Full Name">
            <input id="email" type="email" class="w-full p-5 border rounded-2xl mb-6" placeholder="Email">
            <button onclick="signup()" class="w-full bg-rose-600 text-white py-5 rounded-3xl text-lg font-semibold">Create Account</button>
        </div>
    </div>

    <!-- Main -->
    <div id="main" class="hidden">
        <div class="p-4 bg-white shadow">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-rose-600">HeartBloom</h1>
                <button onclick="logout()" class="text-red-500">Logout</button>
            </div>
        </div>

        <div class="p-4">
            <textarea id="postText" class="w-full h-32 p-4 border rounded-3xl" placeholder="Share your love moment..."></textarea>
            <button onclick="makePost()" class="mt-4 w-full bg-rose-600 text-white py-4 rounded-3xl">Post to Public Wall</button>

            <div id="feed" class="mt-8 space-y-6">
                <!-- Posts appear here -->
            </div>
        </div>
    </div>
</div>

<script>
    function signup() {
        const name = document.getElementById("name").value || "User";
        const email = document.getElementById("email").value;
        
        alert(`✅ Account created for ${name}!\n\nA verification code has been sent to ${email || "your email"} (Demo)`);
        
        document.getElementById("signup").classList.add("hidden");
        document.getElementById("main").classList.remove("hidden");
    }

    function makePost() {
        const text = document.getElementById("postText").value;
        if (!text) return alert("Write something first");
        
        const feed = document.getElementById("feed");
        feed.innerHTML = `
            <div class="bg-white rounded-3xl p-6 shadow">
                <p class="font-medium">You just now</p>
                <p class="mt-3">${text}</p>
                <div class="flex gap-6 mt-6 text-gray-500">
                    <button onclick="like(this)" class="flex items-center gap-1"><i class="fas fa-heart"></i> Like</button>
                    <button class="flex items-center gap-1"><i class="fas fa-comment"></i> Comment</button>
                    <button class="flex items-center gap-1"><i class="fas fa-share"></i> Share</button>
                </div>
            </div>
        ` + feed.innerHTML;
        
        document.getElementById("postText").value = "";
        alert("✅ Post sent to Public Wall!");
    }

    function like(btn) {
        btn.innerHTML = '❤️ Liked';
    }

    function logout() {
        document.getElementById("main").classList.add("hidden");
        document.getElementById("signup").classList.remove("hidden");
    }
</script>
</body>
</html>
