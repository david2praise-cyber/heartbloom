<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBloom 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-50 min-h-screen">

<div class="max-w-xl mx-auto">
    <div class="bg-gradient-to-r from-rose-500 to-pink-500 p-6 text-white">
        <h1 class="text-3xl font-bold">HeartBloom</h1>
        <p class="opacity-90">Love in every moment</p>
    </div>

    <div class="p-5">
        <!-- Daily -->
        <div class="bg-white rounded-3xl p-6 mb-8 shadow">
            <p class="text-rose-500">For you today 💌</p>
            <p class="text-xl mt-2">"You are my favorite reason to smile every morning."</p>
        </div>

        <!-- Post Box -->
        <div class="bg-white rounded-3xl p-6 mb-8">
            <textarea id="post" class="w-full h-28 p-4 border rounded-2xl" placeholder="Share a romantic moment..."></textarea>
            <button onclick="postMoment()" class="mt-4 w-full bg-rose-600 text-white py-4 rounded-3xl font-medium">Share Moment</button>
        </div>

        <!-- Feed -->
        <div id="feed" class="space-y-6"></div>
    </div>
</div>

<script>
    function postMoment() {
        const text = document.getElementById("post").value;
        if (!text) return alert("Write something sweet ❤️");
        
        const feed = document.getElementById("feed");
        feed.innerHTML = `
            <div class="bg-white rounded-3xl p-6 shadow">
                <p class="font-medium text-rose-600">Just now</p>
                <p class="mt-3">${text}</p>
                <div class="flex gap-8 mt-6 text-pink-400">
                    <span onclick="this.innerHTML='❤️ Liked'" class="cursor-pointer">❤️ Like</span>
                    <span class="cursor-pointer">💬 Comment</span>
                </div>
            </div>
        ` + feed.innerHTML;
        
        document.getElementById("post").value = "";
        alert("💕 Moment shared beautifully!");
    }

    // Sample posts
    setTimeout(() => {
        const feed = document.getElementById("feed");
        feed.innerHTML += `<div class="bg-white rounded-3xl p-6 shadow"><p>Just remembered our first date and smiled like a fool ❤️</p></div>`;
    }, 1000);
</script>
</body>
</html>
